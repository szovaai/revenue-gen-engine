# TanStack Start (nitro) on Netlify.
# Netlify is the official deployment partner for TanStack Start; these are the
# documented build settings. See:
#   https://docs.netlify.com/build/frameworks/framework-setup-guides/tanstack-start/

[build]
  command = "bun run build"
  publish = ".output/public"

[build.environment]
  # The Vite config (@lovable.dev/vite-tanstack-config) defaults nitro's target
  # to Cloudflare. Force the Netlify preset so the build emits a Netlify SSR
  # function — without it, SSR routes (including "/") have nothing to serve and
  # return 404.
  NITRO_PRESET = "netlify"

[functions]
  directory = ".output/server"
