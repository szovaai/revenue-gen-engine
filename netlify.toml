# Force nitro to build Netlify-format SSR output.
#
# The Vite config (@lovable.dev/vite-tanstack-config) defaults nitro's target to
# Cloudflare. On Netlify that produces a Cloudflare worker and NO Netlify
# function, so SSR routes (including "/") have no handler and Netlify serves its
# own 404. Setting the preset makes nitro emit a Netlify function + _redirects;
# Netlify auto-detects the publish dir and the internal functions for that preset.
[build.environment]
  NITRO_PRESET = "netlify"
  SERVER_PRESET = "netlify"
